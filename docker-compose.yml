services:
  autoapply:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: autoapply
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APPLY_POLL_SECONDS: 300
      MAX_APPLY_ATTEMPTS: 2
      HEADLESS: "false"
      STATE_PATH: /data/state.json
      SCREENSHOTS_DIR: /data/screenshots
      INSTAHYRE_USER_DATA_DIR: /data/browser-profile-linux
      INSTAHYRE_EMAIL: ${INSTAHYRE_EMAIL:-}
      INSTAHYRE_PASSWORD: ${INSTAHYRE_PASSWORD:-}
      FULL_NAME: ${FULL_NAME:-}
      EMAIL: ${EMAIL:-}
      PHONE: ${PHONE:-}
      RESUME_PATH: ${RESUME_PATH:-/data/resume.pdf}
    command: ["/app/scripts/run_xvfb_autoapply.sh"]
    volumes:
      - ./data:/data
